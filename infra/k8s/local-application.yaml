apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metaboost-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: metaboost
  # repoURL + targetRevision: Git ref Argo CD uses for Sync and OutOfSync comparison (not read by
  # kubectl apply during make local_k3d_up; stack workloads come from kubectl apply -k
  # infra/k8s/local/stack). Align targetRevision with the branch you push when you want Sync.
  source:
    repoURL: https://github.com/podverse/metaboost.git
    targetRevision: develop
    path: infra/k8s/local/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: metaboost-local
  # Manual sync: avoids resetting the stack Application CR and workloads to Git while iterating
  # locally. Run Sync in Argo CD when you want apps/ manifests applied from the repo.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
