apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: github-registry-secret
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z metaboost-db 5432; do echo waiting for metaboost-db; sleep 2; done; echo metaboost-db ready
        - name: wait-valkey
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z metaboost-keyvaldb 6379; do echo waiting for metaboost-keyvaldb; sleep 2; done; echo metaboost-keyvaldb ready
      containers:
        - name: api
          image: ghcr.io/podverse/metaboost/api
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: metaboost-api-config
            - secretRef:
                name: metaboost-api-secrets
            - secretRef:
                name: metaboost-mailer-opaque
                optional: true
            - secretRef:
                name: metaboost-db-secrets
            - secretRef:
                name: metaboost-keyvaldb-secrets
          env:
            - name: DB_HOST
              value: metaboost-db
            - name: DB_PORT
              value: "5432"
            - name: KEYVALDB_HOST
              value: metaboost-keyvaldb
            - name: KEYVALDB_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
