apiVersion: apps/v1
kind: Deployment
metadata:
  name: metaboost-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metaboost-db
  template:
    metadata:
      labels:
        app: metaboost-db
    spec:
      enableServiceLinks: false
      containers:
        - name: metaboost-db
          image: postgres:18.3
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_OWNER_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_OWNER_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_NAME
            - name: DB_APP_NAME
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_NAME
            - name: DB_APP_OWNER_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_OWNER_USER
            - name: DB_APP_OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_OWNER_PASSWORD
            - name: DB_APP_MIGRATOR_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_MIGRATOR_USER
            - name: DB_APP_MIGRATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_MIGRATOR_PASSWORD
            - name: DB_APP_READ_WRITE_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_READ_WRITE_USER
            - name: DB_APP_READ_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_READ_WRITE_PASSWORD
            - name: DB_APP_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_READ_PASSWORD
            - name: DB_APP_READ_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_READ_USER
            - name: DB_MANAGEMENT_NAME
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_NAME
            - name: DB_MANAGEMENT_OWNER_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_OWNER_USER
            - name: DB_MANAGEMENT_OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_OWNER_PASSWORD
            - name: DB_MANAGEMENT_MIGRATOR_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_MIGRATOR_USER
            - name: DB_MANAGEMENT_MIGRATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_MIGRATOR_PASSWORD
            - name: DB_MANAGEMENT_READ_WRITE_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_READ_WRITE_USER
            - name: DB_MANAGEMENT_READ_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_READ_WRITE_PASSWORD
            - name: DB_MANAGEMENT_READ_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_READ_USER
            - name: DB_MANAGEMENT_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_READ_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
            - name: app-db-init-scripts
              mountPath: /docker-entrypoint-initdb.d/0001_create_app_db_users.sh
              subPath: 0001_create_app_db_users.sh
            - name: management-init-scripts
              mountPath: /docker-entrypoint-initdb.d/0002_setup_management_database.sh
              subPath: 0002_setup_management_database.sh
            - name: db-init-scripts
              mountPath: /docker-entrypoint-initdb.d/0003_apply_linear_baselines.sh
              subPath: 0003_apply_linear_baselines.sh
            - name: db-init-scripts
              mountPath: /linear-baseline/app.sql.gz
              subPath: 0003a_app_linear_baseline.sql.gz
            - name: db-init-scripts
              mountPath: /linear-baseline/management.sql.gz
              subPath: 0003b_management_linear_baseline.sql.gz
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "${DB_APP_OWNER_USER:-metaboost_app_owner}"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "${DB_APP_OWNER_USER:-metaboost_app_owner}"
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: metaboost-postgres-data
        - name: app-db-init-scripts
          configMap:
            name: metaboost-app-db-init-scripts
        - name: management-init-scripts
          configMap:
            name: metaboost-management-init-scripts
        - name: db-init-scripts
          configMap:
            name: metaboost-db-init-scripts
