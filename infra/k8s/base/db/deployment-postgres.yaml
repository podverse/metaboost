apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: postgres:18.1
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_APP_NAME
            - name: DB_APP_NAME
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_APP_NAME
            - name: DB_APP_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_APP_READ_PASSWORD
            - name: DB_APP_READ_USER
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_APP_READ_USER
            - name: DB_APP_READ_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_APP_READ_WRITE_PASSWORD
            - name: DB_APP_READ_WRITE_USER
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_APP_READ_WRITE_USER
            - name: DB_MANAGEMENT_NAME
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_MANAGEMENT_NAME
            - name: DB_MANAGEMENT_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_MANAGEMENT_READ_PASSWORD
            - name: DB_MANAGEMENT_READ_USER
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_MANAGEMENT_READ_USER
            - name: DB_MANAGEMENT_READ_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_MANAGEMENT_READ_WRITE_PASSWORD
            - name: DB_MANAGEMENT_READ_WRITE_USER
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_MANAGEMENT_READ_WRITE_USER
            - name: DB_MANAGEMENT_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_MANAGEMENT_SUPERUSER_PASSWORD
            - name: DB_MANAGEMENT_SUPERUSER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_MANAGEMENT_SUPERUSER_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_PASSWORD
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: boilerplate-db-secrets
                  key: DB_USER
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "${DB_USER:-postgres}"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "${DB_USER:-postgres}"
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: boilerplate-postgres-data
        - name: postgres-init
          configMap:
            name: boilerplate-db-postgres-init
            defaultMode: 0755
