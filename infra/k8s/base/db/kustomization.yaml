apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: metaboost-app-db-init-scripts
    files:
      - 0001_create_app_db_users.sh=source/bootstrap/0001_create_app_db_users.sh
  - name: metaboost-management-init-scripts
    files:
      - 0002_setup_management_database.sh=source/bootstrap/0002_setup_management_database.sh
      - 0006_management_grants.sh=source/bootstrap/0006_management_grants.sh
  - name: metaboost-db-init-scripts
    files:
      - 0003_linear_baseline.sql.gz=source/bootstrap/0003_linear_baseline.sql.gz
      - 0004_seed_linear_migration_history.sql=source/bootstrap/0004_seed_linear_migration_history.sql

resources:
  - pvc-postgres.yaml
  - service-postgres.yaml
  - deployment-postgres.yaml
