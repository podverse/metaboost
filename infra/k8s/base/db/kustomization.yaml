apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - service.yaml
  - statefulset.yaml

configMapGenerator:
  - name: metaboost-app-db-init-scripts
    files:
      - 0001_create_app_db_users.sh=source/bootstrap/0001_create_app_db_users.sh
  - name: metaboost-management-init-scripts
    files:
      - 0002_setup_management_database.sh=source/bootstrap/0002_setup_management_database.sh
  - name: metaboost-db-init-scripts
    files:
      - 0003_apply_linear_baselines.sh=source/bootstrap/0003_apply_linear_baselines.sh
      - 0003a_app_linear_baseline.sql.gz=source/bootstrap/0003a_app_linear_baseline.sql.gz
      - 0003b_management_linear_baseline.sql.gz=source/bootstrap/0003b_management_linear_baseline.sql.gz

generatorOptions:
  disableNameSuffixHash: true
