apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: metaboost-db-bootstrap-source
    files:
      # Bootstrap scripts only; schema is applied by linear migration jobs.
      - source/bootstrap/0001_create_app_db_users.sh
      - source/bootstrap/0002_setup_management_database.sh
      - source/bootstrap/0006_management_grants.sh

resources:
  - pvc-postgres.yaml
  - service-postgres.yaml
  - deployment-postgres.yaml
