apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: metaboost-db-postgres-init
    files:
      # Canonical postgres-init source for app/management schema SQL and init scripts.
      - postgres-init/0001_create_app_db_users.sh
      - postgres-init/0002_setup_management_database.sh
      - postgres-init/0003_app_schema.sql
      - postgres-init/0004_load_management_schema.sh
      - postgres-init/0005_management_schema.sql.frag
      - postgres-init/0006_management_grants.sh
      - postgres-init/0008_bucket_type_rss_network_rename.sql

resources:
  - pvc-postgres.yaml
  - service-postgres.yaml
  - deployment-postgres.yaml
