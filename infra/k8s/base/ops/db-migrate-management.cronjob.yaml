apiVersion: batch/v1
kind: CronJob
metadata:
  name: metaboost-db-migrate-management
spec:
  schedule: "0 0 1 1 *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          annotations:
            metaboost.example.org/migration-job: management-linear
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          containers:
            - name: db-migrate-management
              image: postgres:18.3
              imagePullPolicy: Always
              command:
                - bash
                - /opt/scripts/database/run-linear-migrations-k8s.sh
                - --database
                - management
              env:
                - name: DB_HOST
                  value: metaboost-db
                - name: DB_PORT
                  value: "5432"
                - name: DB_MANAGEMENT_MIGRATOR_USER
                  valueFrom:
                    secretKeyRef:
                      name: metaboost-db-secrets
                      key: DB_MANAGEMENT_MIGRATOR_USER
                - name: DB_MANAGEMENT_MIGRATOR_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: metaboost-db-secrets
                      key: DB_MANAGEMENT_MIGRATOR_PASSWORD
                - name: DB_MANAGEMENT_NAME
                  valueFrom:
                    secretKeyRef:
                      name: metaboost-db-secrets
                      key: DB_MANAGEMENT_NAME
                - name: LINEAR_MIGRATIONS_BASE_DIR
                  value: /opt/infra/k8s/base/ops/source/database/linear-migrations
                - name: MIGRATION_BUNDLE_SHA
                  valueFrom:
                    configMapKeyRef:
                      name: metaboost-ops-migration-runtime
                      key: MIGRATION_BUNDLE_SHA
              volumeMounts:
                - name: migration-runtime
                  mountPath: /opt/scripts/database
                  readOnly: true
                - name: management-migrations
                  mountPath: /opt/infra/k8s/base/ops/source/database/linear-migrations/management
                  readOnly: true
          volumes:
            - name: migration-runtime
              configMap:
                name: metaboost-ops-migration-runtime
                defaultMode: 0555
            - name: management-migrations
              configMap:
                name: metaboost-ops-management-migrations
                defaultMode: 0444
