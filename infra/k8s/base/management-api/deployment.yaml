apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-api
  template:
    metadata:
      labels:
        app: management-api
    spec:
      imagePullSecrets:
        - name: github-registry-secret
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done; echo postgres ready
        - name: wait-valkey
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z valkey 6379; do echo waiting for valkey; sleep 2; done; echo valkey ready
      containers:
        - name: management-api
          image: ghcr.io/podverse/metaboost/management-api
          imagePullPolicy: Always
          ports:
            - containerPort: 4100
          envFrom:
            - configMapRef:
                name: metaboost-management-api-config
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: VALKEY_HOST
              value: valkey
            - name: VALKEY_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 4100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 4100
            initialDelaySeconds: 10
            periodSeconds: 10
