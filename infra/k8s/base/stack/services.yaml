apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: metaboost-local
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: metaboost-local
spec:
  selector:
    app: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: metaboost-local
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: web-sidecar
  namespace: metaboost-local
spec:
  selector:
    app: web-sidecar
  ports:
    - name: http
      port: 4001
      targetPort: 4001
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: metaboost-local
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 4002
      targetPort: 4002
---
apiVersion: v1
kind: Service
metadata:
  name: management-api
  namespace: metaboost-local
spec:
  selector:
    app: management-api
  ports:
    - name: http
      port: 4100
      targetPort: 4100
---
apiVersion: v1
kind: Service
metadata:
  name: management-web-sidecar
  namespace: metaboost-local
spec:
  selector:
    app: management-web-sidecar
  ports:
    - name: http
      port: 4101
      targetPort: 4101
---
apiVersion: v1
kind: Service
metadata:
  name: management-web
  namespace: metaboost-local
spec:
  selector:
    app: management-web
  ports:
    - name: http
      port: 4102
      targetPort: 4102
