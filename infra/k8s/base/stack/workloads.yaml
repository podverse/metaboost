apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: metaboost-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: postgres:18.3
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_ADMIN_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_ADMIN_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_NAME
            - name: DB_APP_NAME
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_NAME
            - name: DB_APP_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_READ_PASSWORD
            - name: DB_APP_READ_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_READ_USER
            - name: DB_APP_READ_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_READ_WRITE_PASSWORD
            - name: DB_APP_READ_WRITE_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_APP_READ_WRITE_USER
            - name: DB_MANAGEMENT_NAME
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_NAME
            - name: DB_MANAGEMENT_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_ADMIN_USER
            - name: DB_MANAGEMENT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_ADMIN_PASSWORD
            - name: DB_MANAGEMENT_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_READ_PASSWORD
            - name: DB_MANAGEMENT_READ_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_READ_USER
            - name: DB_MANAGEMENT_READ_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_READ_WRITE_PASSWORD
            - name: DB_MANAGEMENT_READ_WRITE_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-db-secrets
                  key: DB_MANAGEMENT_READ_WRITE_USER
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
            - name: app-db-init-scripts
              mountPath: /docker-entrypoint-initdb.d/0001_create_app_db_users.sh
              subPath: 0001_create_app_db_users.sh
            - name: management-init-scripts
              mountPath: /docker-entrypoint-initdb.d/0002_setup_management_database.sh
              subPath: 0002_setup_management_database.sh
            - name: db-init-scripts
              mountPath: /docker-entrypoint-initdb.d/0003_linear_baseline.sql.gz
              subPath: 0003_linear_baseline.sql.gz
            - name: db-init-scripts
              mountPath: /docker-entrypoint-initdb.d/0004_seed_linear_migration_history.sql
              subPath: 0004_seed_linear_migration_history.sql
            - name: management-init-scripts
              mountPath: /docker-entrypoint-initdb.d/0006_management_grants.sh
              subPath: 0006_management_grants.sh
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "${DB_APP_ADMIN_USER:-metaboost_app_admin}"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "${DB_APP_ADMIN_USER:-metaboost_app_admin}"
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: metaboost-postgres-data
        - name: app-db-init-scripts
          configMap:
            name: metaboost-app-db-init-scripts
        - name: management-init-scripts
          configMap:
            name: metaboost-management-init-scripts
        - name: db-init-scripts
          configMap:
            name: metaboost-db-init-scripts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: metaboost-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      enableServiceLinks: false
      containers:
        - name: valkey
          image: valkey/valkey:7-alpine
          command:
            - /bin/sh
            - -c
            - exec valkey-server --requirepass "$KEYVALDB_PASSWORD"
          env:
            - name: KEYVALDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-valkey-secrets
                  key: KEYVALDB_PASSWORD
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: valkey-data
              mountPath: /data
      volumes:
        - name: valkey-data
          persistentVolumeClaim:
            claimName: metaboost-valkey-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: metaboost-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done; echo postgres ready
        - name: wait-valkey
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z valkey 6379; do echo waiting for valkey; sleep 2; done; echo valkey ready
      containers:
        - name: api
          image: metaboost-local-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: API_JWT_SECRET
            - name: ACCOUNT_SIGNUP_MODE
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: ACCOUNT_SIGNUP_MODE
            - name: API_USER_AGENT
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_USER_AGENT
            - name: API_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_PUBLIC_BASE_URL
            - name: API_MESSAGES_TERMS_OF_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_MESSAGES_TERMS_OF_SERVICE_URL
            - name: API_EXCHANGE_RATES_FIAT_BASE_CURRENCY
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_EXCHANGE_RATES_FIAT_BASE_CURRENCY
            - name: API_EXCHANGE_RATES_FIAT_PROVIDER_URL
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_EXCHANGE_RATES_FIAT_PROVIDER_URL
            - name: API_EXCHANGE_RATES_BTC_PROVIDER_URL
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_EXCHANGE_RATES_BTC_PROVIDER_URL
            - name: API_EXCHANGE_RATES_CACHE_TTL_MS
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_EXCHANGE_RATES_CACHE_TTL_MS
            - name: API_EXCHANGE_RATES_MAX_STALE_MS
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_EXCHANGE_RATES_MAX_STALE_MS
            - name: API_EXCHANGE_RATES_SERVER_STANDARD_CURRENCY
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_EXCHANGE_RATES_SERVER_STANDARD_CURRENCY
            - name: API_JWT_ACCESS_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_JWT_ACCESS_EXPIRATION
            - name: API_JWT_REFRESH_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_JWT_REFRESH_EXPIRATION
            - name: API_SESSION_COOKIE_NAME
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_SESSION_COOKIE_NAME
            - name: API_REFRESH_COOKIE_NAME
              valueFrom:
                configMapKeyRef:
                  name: metaboost-api-config
                  key: API_REFRESH_COOKIE_NAME
            - name: DB_APP_NAME
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: DB_APP_NAME
            - name: DB_APP_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: DB_APP_READ_PASSWORD
            - name: DB_APP_READ_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: DB_APP_READ_USER
            - name: DB_APP_READ_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: DB_APP_READ_WRITE_PASSWORD
            - name: DB_APP_READ_WRITE_USER
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: DB_APP_READ_WRITE_USER
            - name: MAILER_FROM
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: MAILER_FROM
            - name: MAILER_HOST
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: MAILER_HOST
            - name: MAILER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: MAILER_PASSWORD
            - name: MAILER_PORT
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: MAILER_PORT
            - name: MAILER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: MAILER_USERNAME
            - name: KEYVALDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-api-secrets
                  key: KEYVALDB_PASSWORD
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: KEYVALDB_HOST
              value: valkey
            - name: KEYVALDB_PORT
              value: "6379"
            # Override Kubernetes service-link env: Service named "api" injects API_PORT=tcp://... which
            # breaks apps/api numeric port validation.
            - name: API_PORT
              value: "4000"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
---
