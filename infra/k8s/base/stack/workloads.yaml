apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-sidecar
  namespace: metaboost-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-sidecar
  template:
    metadata:
      labels:
        app: web-sidecar
    spec:
      enableServiceLinks: false
      containers:
        - name: web-sidecar
          image: metaboost-local-web-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          envFrom:
            - secretRef:
                name: metaboost-web-sidecar-secrets
          env:
            - name: API_SERVER_BASE_URL
              value: http://api:4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: metaboost-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-web-sidecar
          image: alpine:3.19
          command:
            - sh
            - -c
            - until wget -q -O /dev/null http://web-sidecar:4001/; do echo waiting for web-sidecar; sleep 2; done; echo web-sidecar ready
      containers:
        - name: web
          image: metaboost-local-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          envFrom:
            - secretRef:
                name: metaboost-web-secrets
          env:
            - name: RUNTIME_CONFIG_URL
              value: http://web-sidecar:4001
            - name: API_SERVER_BASE_URL
              value: http://api:4000
          readinessProbe:
            tcpSocket:
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
