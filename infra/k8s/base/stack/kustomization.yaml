apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: metaboost-local

resources:
  - namespace.yaml
  - pvc.yaml
  - workloads.yaml
  - services.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: metaboost-bootstrap-source
    files:
      # Bootstrap scripts only; schema is applied by migration jobs.
      - ../db/source/bootstrap/0001_create_app_db_users.sh
      - ../db/source/bootstrap/0002_setup_management_database.sh
      - ../db/source/bootstrap/0006_management_grants.sh
