apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - service.yaml
  - deployment.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: metaboost-web-config
    envs:
      - source/web.env
  - name: metaboost-web-runtime-config
    envs:
      - source/web-sidecar.env

replacements:
  - source:
      kind: Service
      name: web
      fieldPath: spec.ports.0.port
    targets:
      - select:
          kind: Service
          name: web
        fieldPaths:
          - spec.ports.0.targetPort
      - select:
          kind: Deployment
          name: web
        fieldPaths:
          - spec.template.spec.containers.0.ports.0.containerPort
          - spec.template.spec.containers.0.readinessProbe.httpGet.port
          - spec.template.spec.containers.0.livenessProbe.httpGet.port
