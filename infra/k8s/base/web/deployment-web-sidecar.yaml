apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-sidecar
  template:
    metadata:
      labels:
        app: web-sidecar
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: github-registry-secret
      containers:
        - name: web-sidecar
          image: ghcr.io/podverse/metaboost/web-sidecar
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: metaboost-web-runtime-config
