apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      enableServiceLinks: false
      containers:
        - name: valkey
          image: valkey/valkey:7-alpine
          command:
            - /bin/sh
            - -c
            - exec valkey-server --requirepass "$KEYVALDB_PASSWORD"
          ports:
            - containerPort: 6379
          env:
            - name: KEYVALDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metaboost-keyvaldb-secrets
                  key: KEYVALDB_PASSWORD
          volumeMounts:
            - name: valkey-data
              mountPath: /data
      volumes:
        - name: valkey-data
          persistentVolumeClaim:
            claimName: metaboost-valkey-data
