apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-web
  template:
    metadata:
      labels:
        app: management-web
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: github-registry-secret
      initContainers:
        - name: wait-management-api-version-contract
          image: curlimages/curl:8.13.0
          envFrom:
            - configMapRef:
                name: metaboost-management-web-runtime-config
          command:
            - sh
            - -c
            - |
              until curl -fsS "$READINESS_API_BASE_URL$READINESS_API_META_PATH" | grep -F "\"version\":\"$READINESS_API_EXPECTED_VERSION_PATH\"" | grep -F "\"release\":\"$READINESS_API_EXPECTED_RELEASE\"" >/dev/null; do
                echo waiting for management API contract $READINESS_API_BASE_URL$READINESS_API_META_PATH version=$READINESS_API_EXPECTED_VERSION_PATH release=$READINESS_API_EXPECTED_RELEASE
                sleep 2
              done
              echo management API version/release contract ready
      containers:
        - name: management-web
          image: ghcr.io/podverse/metaboost/management-web
          imagePullPolicy: Always
          ports:
            - containerPort: 4102
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: metaboost-management-web-config
          readinessProbe:
            httpGet:
              path: /
              port: 4102
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 4102
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /runtime-config
              port: 4101
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 60
        - name: management-web-sidecar
          image: ghcr.io/podverse/metaboost/management-web-sidecar
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "4101"
          envFrom:
            - configMapRef:
                name: metaboost-management-web-runtime-config
          ports:
            - containerPort: 4101
              name: runtime-config
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /runtime-config
              port: 4101
              scheme: HTTP
            initialDelaySeconds: 2
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /runtime-config
              port: 4101
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
