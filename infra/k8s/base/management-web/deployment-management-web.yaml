apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-web
  template:
    metadata:
      labels:
        app: management-web
    spec:
      imagePullSecrets:
        - name: github-registry-secret
      initContainers:
        - name: wait-management-web-sidecar
          image: alpine:3.19
          command:
            - sh
            - -c
            - until wget -q -O /dev/null http://management-web-sidecar:4101/; do echo waiting for management-web-sidecar; sleep 2; done; echo management-web-sidecar ready
      containers:
        - name: management-web
          image: ghcr.io/podverse/metaboost/management-web
          imagePullPolicy: Always
          ports:
            - containerPort: 4102
          env:
            - name: RUNTIME_CONFIG_URL
              value: http://management-web-sidecar:4101
            - name: MANAGEMENT_API_SERVER_BASE_URL
              value: http://management-api:4100
          readinessProbe:
            tcpSocket:
              port: 4102
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4102
            initialDelaySeconds: 15
            periodSeconds: 10
