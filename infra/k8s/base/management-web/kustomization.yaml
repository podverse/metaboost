apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - service-management-web.yaml
  - service-management-web-sidecar.yaml
  - deployment-management-web.yaml
  - deployment-management-web-sidecar.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: metaboost-management-web-config
    envs:
      - source/management-web.env
  - name: metaboost-management-web-runtime-config
    envs:
      - source/management-web-sidecar.env
