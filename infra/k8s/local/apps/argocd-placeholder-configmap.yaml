apiVersion: v1
kind: ConfigMap
metadata:
  name: metaboost-local-argocd-apps-placeholder
  namespace: metaboost-local
data:
  note: |
    Parent Application metaboost-local syncs this directory from Git. The stack Application CR
    lives at infra/k8s/argocd/metaboost-local-stack-application.yaml and is kubectl-applied from
    disk during bootstrap so local manifest edits are not overwritten by Git on every reconcile.
