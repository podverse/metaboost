networks:
  metaboost_local_network:
    external: true

services:
  metaboost_local_web:
    build:
      context: ../../../..
      dockerfile: infra/docker/local/web/Dockerfile
    image: metaboost-web:latest
    container_name: metaboost_local_web
    depends_on:
      - metaboost_local_web_sidecar
    env_file:
      - ../../../config/local/web.env
    environment:
      PORT: "4100"
    networks:
      - metaboost_local_network
    ports:
      - 127.0.0.1:4100:4100
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  # Sidecar is internal-only: no ports exposed. Only web container reaches it via RUNTIME_CONFIG_URL.
  metaboost_local_web_sidecar:
    build:
      context: ../../../..
      dockerfile: infra/docker/local/web-sidecar/Dockerfile
    image: metaboost-web-sidecar:latest
    container_name: metaboost_local_web_sidecar
    env_file:
      - ../../../config/local/web-sidecar.env
    environment:
      PORT: "4101"
    networks:
      - metaboost_local_network
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m
