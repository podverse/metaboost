networks:
  metaboost_local_network:
    external: true

services:
  metaboost_local_api:
    build:
      context: ../../../..
      dockerfile: infra/docker/local/api/Dockerfile
    image: metaboost-api:latest
    container_name: metaboost_local_api
    env_file:
      - ../../../config/local/api.env
      - ../../../config/local/db.env
      - ../../../config/local/db-app.env
    networks:
      metaboost_local_network:
        aliases:
          - metaboost_local_api
    ports:
      - 127.0.0.1:4000:4000
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m
