# Combined local stack: api, management-api, web, management-web, sidecar, postgres, valkey.
# From repo root: docker compose -f infra/docker/local/docker-compose.yml --project-directory . up --build
# Env: make local_env_setup (copies to infra/config/local/*.env)

networks:
  metaboost_local_network:
    name: metaboost_local_network
    external: true

volumes:
  metaboost_postgres_data:
    name: metaboost_postgres_data
  metaboost_valkey_data:
    name: metaboost_valkey_data

services:
  postgres:
    image: postgres:18.1
    container_name: metaboost_local_postgres
    env_file:
      - infra/config/local/db.env
    environment:
      # Official image reads POSTGRES_*; repo templates use DB_USER / DB_PASSWORD / DB_APP_NAME.
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
      POSTGRES_DB: ${DB_APP_NAME:-metaboost_app}
    volumes:
      - metaboost_postgres_data:/var/lib/postgresql
      - ./infra/k8s/base/db/postgres-init/0001_create_app_db_users.sh:/docker-entrypoint-initdb.d/0001_create_app_db_users.sh:ro
      - ./infra/k8s/base/db/postgres-init/0002_setup_management_database.sh:/docker-entrypoint-initdb.d/0002_setup_management_database.sh:ro
      - ./infra/k8s/base/db/postgres-init/0003_app_schema.sql:/docker-entrypoint-initdb.d/0003_app_schema.sql:ro
      - ./infra/k8s/base/db/postgres-init/0004_load_management_schema.sh:/docker-entrypoint-initdb.d/0004_load_management_schema.sh:ro
      - ./infra/k8s/base/db/postgres-init/0005_management_schema.sql.frag:/docker-entrypoint-initdb.d/0005_management_schema.sql.frag:ro
      - ./infra/k8s/base/db/postgres-init/0006_management_grants.sh:/docker-entrypoint-initdb.d/0006_management_grants.sh:ro
      - ./infra/k8s/base/db/postgres-init/0007_default_terms_version.sql:/docker-entrypoint-initdb.d/0007_default_terms_version.sql:ro
      - ./infra/k8s/base/db/postgres-init/0008_seed_local_user.sql:/docker-entrypoint-initdb.d/0008_seed_local_user.sql:ro
    ports:
      - 127.0.0.1:5532:5432
    networks:
      - metaboost_local_network
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "${DB_USER:-user}"']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  valkey:
    image: valkey/valkey:7-alpine
    container_name: metaboost_local_valkey
    env_file:
      - infra/config/local/valkey-source-only.env
      - infra/config/local/valkey.env
    command: ["/bin/sh", "-c", 'exec valkey-server --requirepass "$$VALKEY_PASSWORD"']
    volumes:
      - metaboost_valkey_data:/data
    ports:
      - 127.0.0.1:6479:6379
    networks:
      - metaboost_local_network
    healthcheck:
      test: ["CMD-SHELL", 'valkey-cli -a "$$VALKEY_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  metaboost_local_api:
    build:
      context: .
      dockerfile: infra/docker/local/api/Dockerfile
    image: metaboost-api:latest
    container_name: metaboost_local_api
    env_file:
      - infra/config/local/api.env
      - infra/config/local/db.env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      metaboost_local_network:
        aliases:
          - metaboost_local_api
    ports:
      - 127.0.0.1:4000:4000
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  # Sidecar: not exposed to host; only web container uses it via RUNTIME_CONFIG_URL.
  metaboost_local_web_sidecar:
    build:
      context: .
      dockerfile: infra/docker/local/web-sidecar/Dockerfile
    image: metaboost-web-sidecar:latest
    container_name: metaboost_local_web_sidecar
    env_file:
      - infra/config/local/web-sidecar.env
    environment:
      WEB_SIDECAR_PORT: "4001"
    depends_on:
      metaboost_local_api:
        condition: service_started
    networks:
      - metaboost_local_network
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  # Management-web sidecar: not exposed to host; only management-web container uses it via RUNTIME_CONFIG_URL.
  metaboost_local_management_web_sidecar:
    build:
      context: .
      dockerfile: infra/docker/local/management-web-sidecar/Dockerfile
    image: metaboost-management-web-sidecar:latest
    container_name: metaboost_local_management_web_sidecar
    env_file:
      - infra/config/local/management-web-sidecar.env
    environment:
      MANAGEMENT_WEB_SIDECAR_PORT: "4101"
    networks:
      - metaboost_local_network
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  metaboost_local_web:
    build:
      context: .
      dockerfile: infra/docker/local/web/Dockerfile
    image: metaboost-web:latest
    container_name: metaboost_local_web
    depends_on:
      metaboost_local_web_sidecar:
        condition: service_started
    env_file:
      - infra/config/local/web.env
    environment:
      PORT: "4002"
      RUNTIME_CONFIG_URL: "http://metaboost_local_web_sidecar:4001"
    networks:
      - metaboost_local_network
    ports:
      - 127.0.0.1:4002:4002
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  metaboost_local_management_api:
    build:
      context: .
      dockerfile: infra/docker/local/management-api/Dockerfile
    image: metaboost-management-api:latest
    container_name: metaboost_local_management_api
    env_file:
      - infra/config/local/management-api.env
      - infra/config/local/db.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      metaboost_local_network:
        aliases:
          - metaboost_local_management_api
    ports:
      - 127.0.0.1:4100:4100
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  metaboost_local_management_web:
    build:
      context: .
      dockerfile: infra/docker/local/management-web/Dockerfile
    image: metaboost-management-web:latest
    container_name: metaboost_local_management_web
    depends_on:
      metaboost_local_management_web_sidecar:
        condition: service_started
      metaboost_local_management_api:
        condition: service_started
    env_file:
      - infra/config/local/management-web.env
    environment:
      PORT: "4102"
      RUNTIME_CONFIG_URL: "http://metaboost_local_management_web_sidecar:4101"
    networks:
      - metaboost_local_network
    ports:
      - 127.0.0.1:4102:4102
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m

  # Postgres web UI. Visit http://localhost:4050 — no login required; both databases pre-connected.
  metaboost_local_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: metaboost_local_pgadmin
    env_file:
      - infra/config/local/db.env
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGPASSFILE: /tmp/pgpass
    entrypoint:
      - /bin/sh
      - -c
      - >-
        echo "postgres:5432:*:$$DB_USER:$$DB_PASSWORD" > /tmp/pgpass &&
        chmod 0600 /tmp/pgpass &&
        /entrypoint.sh
    volumes:
      - ./infra/docker/local/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - 127.0.0.1:4050:80
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metaboost_local_network
    logging:
      driver: "json-file"
      options:
        max-file: "1"
        max-size: 50m
