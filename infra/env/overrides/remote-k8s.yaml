version: 2
# Portable remote-Kubernetes defaults for every fork (in-cluster service DNS, empty URL/cookie shells).
# Deployment-specific public URLs, cookie domains, and CORS belong in the GitOps repo:
#   apps/metaboost-<env>/env/remote-k8s.env
# (merged after this file when present; see docs/development/k8s/K8S-ENV-RENDER.md).
# Pods resolve in-cluster Services (e.g. postgres in this namespace) to a ClusterIP; DB_PORT/KEYVALDB_PORT
# are the Service targetPort / container listen ports, not the node's host :5432 / :6379 sockets.
# Another product (e.g. Podverse) in a different namespace has its own postgres/valkey Services and ClusterIPs,
# so there is no Kubernetes-level port collision. Caveats: shared NodePort numbers, hostNetwork, or one shared
# host-level or managed DB endpoint require intentional coordination outside these defaults.
#
# Server-side Next.js reads API_SERVER_BASE_URL / MANAGEMENT_API_SERVER_BASE_URL from the runtime-config
# JSON (sidecar ConfigMaps: web/management-web *-runtime-config), Podverse-style—not from duplicate literals
# on the Next.js Deployment. Values must target in-cluster Services (api, management-api), not localhost.
# Apps still prefer process.env when set (Playwright/E2E). Override ports in GitOps remote-k8s.env if
# Service ports differ from 4000/4100.
env_groups:
  db:
    vars:
      DB_HOST:
        default: "postgres"
      DB_PORT:
        default: "5432"
  valkey:
    valkey:
      vars:
        KEYVALDB_HOST:
          default: "valkey"
        KEYVALDB_PORT:
          default: "6379"
  http:
    api:
      vars:
        API_SERVER_BASE_URL:
          default: "http://api:4000"
    management-api:
      vars:
        MANAGEMENT_API_SERVER_BASE_URL:
          default: "http://management-api:4100"
    web:
      vars:
        WEB_BASE_URL:
          default: ""
    management-web:
      vars:
        MANAGEMENT_WEB_BASE_URL:
          default: ""
  api:
    vars:
      API_MESSAGES_TERMS_OF_SERVICE_URL:
        default: ""
      API_EXCHANGE_RATES_FIAT_BASE_CURRENCY:
        default: "USD"
      API_EXCHANGE_RATES_FIAT_PROVIDER_URL:
        default: "https://api.frankfurter.app/latest?from=USD"
      API_EXCHANGE_RATES_BTC_PROVIDER_URL:
        default: "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"
      API_EXCHANGE_RATES_CACHE_TTL_MS:
        default: "600000"
      API_EXCHANGE_RATES_MAX_STALE_MS:
        default: "1800000"
      API_EXCHANGE_RATES_SERVER_STANDARD_CURRENCY:
        default: "USD"
      RSS_PARSE_MIN_INTERVAL_MS:
        default: "600000"
      # Production: enable third-party HTTP used by core features (override to "false" for lockdown).
      API_EXCHANGE_RATES_FETCH_ENABLED:
        default: "true"
      API_RSS_FEED_FETCH_ENABLED:
        default: "true"
      API_COOKIE_DOMAIN:
        default: ""
      API_CORS_ORIGINS:
        default: ""
      API_USER_AGENT:
        default: "metaboost-web Bot Production/API/1"
      STANDARD_ENDPOINT_REQUIRE_HTTPS:
        default: "true"
      STANDARD_ENDPOINT_TRUST_PROXY:
        default: "true"
  management-api:
    vars:
      API_EXCHANGE_RATES_FETCH_ENABLED:
        default: "true"
      MANAGEMENT_API_COOKIE_DOMAIN:
        default: ""
      MANAGEMENT_API_CORS_ORIGINS:
        default: ""
      MANAGEMENT_API_USER_AGENT:
        default: "metaboost-management-api Bot Production/Management-API/1"
