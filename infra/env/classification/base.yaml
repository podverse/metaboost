version: 2
# DB_PORT / VALKEY_PORT literals below are host-published ports (e.g. Docker maps 127.0.0.1:5532->5432).
# Defaults 5532 / 6479 avoid binding localhost:5432 and localhost:6379 so another local stack (e.g. Podverse)
# can use the standard ports on the host while Metaboost dev (npm on the machine) still reaches Postgres/Valkey.
# In-cluster and in-Compose clients use profile overlays (local_docker, local_k8s, remote_k8s) for postgres:5432 / valkey:6379.
namespace_label:
  key: environment
env_groups:
  db:
    vars:
      DB_HOST_SOURCE_ONLY:
        kind: source_only
        default: "postgres"
      DB_PORT_SOURCE_ONLY:
        kind: source_only
        default: "5432"
      DB_HOST:
        kind: literal
        default: "localhost"
      DB_PORT:
        kind: literal
        default: "5532"
      DB_USER:
        kind: secret
        default: "user"
      DB_PASSWORD:
        kind: secret
        default: ""
        local_generator: hex_32
      DB_APP_NAME:
        kind: secret
        default: "metaboost_app"
      DB_APP_READ_USER:
        kind: secret
        default: "metaboost_app_read"
      DB_APP_READ_PASSWORD:
        kind: secret
        default: ""
        local_generator: hex_32
      DB_APP_READ_WRITE_USER:
        kind: secret
        default: "metaboost_app_read_write"
      DB_APP_READ_WRITE_PASSWORD:
        kind: secret
        default: ""
        local_generator: hex_32
      DB_MANAGEMENT_NAME:
        kind: secret
        default: "metaboost_management"
      DB_MANAGEMENT_READ_USER:
        kind: secret
        default: "metaboost_management_read"
      DB_MANAGEMENT_READ_PASSWORD:
        kind: secret
        default: ""
        local_generator: hex_32
      DB_MANAGEMENT_READ_WRITE_USER:
        kind: secret
        default: "metaboost_management_read_write"
      DB_MANAGEMENT_READ_WRITE_PASSWORD:
        kind: secret
        default: ""
        local_generator: hex_32
      DB_MANAGEMENT_SUPERUSER_USERNAME:
        kind: secret
        default: ""
        override_file: db_management_superuser
      DB_MANAGEMENT_SUPERUSER_PASSWORD:
        kind: secret
        default: ""
        override_file: db_management_superuser
  valkey:
    valkey-source-only:
      vars:
        VALKEY_HOST_SOURCE_ONLY:
          kind: source_only
          default: "valkey"
        VALKEY_PORT_SOURCE_ONLY:
          kind: source_only
          default: "6379"
    valkey:
      vars:
        VALKEY_HOST:
          kind: literal
          default: "localhost"
        VALKEY_PORT:
          kind: literal
          default: "6479"
        VALKEY_PASSWORD:
          kind: secret
          default: ""
          local_generator: hex_32
  auth:
    vars:
      AUTH_MODE:
        kind: literal
        default: "admin_only_username"
        override_file: auth
  info:
    vars:
      WEB_BRAND_NAME:
        kind: literal
        default: "metaboost-web"
        override_file: info
      MANAGEMENT_WEB_BRAND_NAME:
        kind: literal
        default: "metaboost-management-web"
        override_file: info
  locale:
    vars:
      DEFAULT_LOCALE:
        kind: literal
        default: "en-US"
        override_file: locale
      SUPPORTED_LOCALES:
        kind: literal
        default: "all-available"
        override_file: locale
  mailer:
    vars:
      MAILER_HOST:
        kind: secret
        default: ""
        override_file: mailer
      MAILER_PORT:
        kind: secret
        default: ""
        override_file: mailer
      MAILER_USER:
        kind: secret
        default: ""
        override_file: mailer
      MAILER_PASSWORD:
        kind: secret
        default: ""
        override_file: mailer
      MAILER_FROM:
        kind: secret
        default: ""
        override_file: mailer
  http:
    api:
      vars:
        API_PORT:
          kind: config
          default: "4000"
        API_VERSION_PATH:
          kind: config
          default: "/v1"
        API_PUBLIC_BASE_URL:
          kind: literal
          default: "http://localhost:4000"
        API_SERVER_BASE_URL:
          kind: literal
          default: "http://localhost:4000"
    web-sidecar:
      vars:
        WEB_SIDECAR_PORT:
          kind: config
          default: "4001"
    web:
      vars:
        WEB_PORT:
          kind: config
          default: "4002"
        WEB_BASE_URL:
          kind: literal
          default: "http://localhost:4002"
    management-api:
      vars:
        MANAGEMENT_API_PORT:
          kind: config
          default: "4100"
        MANAGEMENT_API_PUBLIC_BASE_URL:
          kind: literal
          default: "http://localhost:4100"
        MANAGEMENT_API_SERVER_BASE_URL:
          kind: literal
          default: "http://localhost:4100"
    management-web-sidecar:
      vars:
        MANAGEMENT_WEB_SIDECAR_PORT:
          kind: config
          default: "4101"
    management-web:
      vars:
        MANAGEMENT_WEB_PORT:
          kind: config
          default: "4102"
        MANAGEMENT_WEB_BASE_URL:
          kind: literal
          default: "http://localhost:4102"
  api:
    inherits:
      - from: locale
        map:
          DEFAULT_LOCALE: DEFAULT_LOCALE
          SUPPORTED_LOCALES: SUPPORTED_LOCALES
      - from: auth
        map:
          AUTH_MODE: AUTH_MODE
      - from: info
        map:
          WEB_BRAND_NAME: WEB_BRAND_NAME
          MANAGEMENT_WEB_BRAND_NAME: MANAGEMENT_WEB_BRAND_NAME
      - from: mailer
        map:
          MAILER_HOST: MAILER_HOST
          MAILER_PORT: MAILER_PORT
          MAILER_USER: MAILER_USER
          MAILER_PASSWORD: MAILER_PASSWORD
          MAILER_FROM: MAILER_FROM
      - from: valkey
        file_splits: [valkey]
        map:
          VALKEY_HOST: VALKEY_HOST
          VALKEY_PORT: VALKEY_PORT
          VALKEY_PASSWORD: VALKEY_PASSWORD
      - from: db
        map:
          DB_HOST: DB_HOST
          DB_PORT: DB_PORT
          DB_APP_NAME: DB_APP_NAME
          DB_APP_READ_USER: DB_APP_READ_USER
          DB_APP_READ_PASSWORD: DB_APP_READ_PASSWORD
          DB_APP_READ_WRITE_USER: DB_APP_READ_WRITE_USER
          DB_APP_READ_WRITE_PASSWORD: DB_APP_READ_WRITE_PASSWORD
      - from: http
        file_splits: [api, web]
        map:
          API_PORT: API_PORT
          API_VERSION_PATH: API_VERSION_PATH
          API_PUBLIC_BASE_URL: API_PUBLIC_BASE_URL
          API_SERVER_BASE_URL: API_SERVER_BASE_URL
          WEB_PORT: WEB_PORT
          WEB_BASE_URL: WEB_BASE_URL
    vars:
      API_MESSAGES_TERMS_OF_SERVICE_URL:
        kind: literal
        default: "http://localhost:4002/terms"
      API_EXCHANGE_RATES_FIAT_BASE_CURRENCY:
        kind: literal
        default: "USD"
      API_EXCHANGE_RATES_FIAT_PROVIDER_URL:
        kind: literal
        default: "https://api.frankfurter.app/latest?from=USD"
      API_EXCHANGE_RATES_BTC_PROVIDER_URL:
        kind: literal
        default: "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"
      API_EXCHANGE_RATES_CACHE_TTL_MS:
        kind: literal
        default: "600000"
      API_EXCHANGE_RATES_MAX_STALE_MS:
        kind: literal
        default: "1800000"
      API_EXCHANGE_RATES_SERVER_STANDARD_CURRENCY:
        kind: literal
        default: "USD"
      RSS_PARSE_MIN_INTERVAL_MS:
        kind: literal
        default: "600000"
      API_USER_AGENT:
        kind: literal
        default: "Metaboost Bot Local/API/1"
        override_file: user_agent
      API_JWT_SECRET:
        kind: secret
        default: ""
        local_generator: hex_32
      API_COOKIE_DOMAIN:
        kind: literal
        default: "localhost"
      API_CORS_ORIGINS:
        kind: literal
        default: "http://localhost:4002"
      API_SESSION_COOKIE_NAME:
        kind: literal
        default: "api_session"
      API_REFRESH_COOKIE_NAME:
        kind: literal
        default: "api_refresh"
      API_JWT_ACCESS_EXPIRY_SECONDS:
        kind: literal
        default: "2592000"
      API_JWT_REFRESH_EXPIRY_SECONDS:
        kind: literal
        default: "2592000"
      STANDARD_ENDPOINT_REGISTRY_URL:
        kind: literal
        default: "https://raw.githubusercontent.com/podverse/metaboost-registry/main/registry/apps"
      STANDARD_ENDPOINT_REGISTRY_POLL_SECONDS:
        kind: literal
        default: "300"
      STANDARD_ENDPOINT_REGISTRY_TIMEOUT_MS:
        kind: literal
        default: "10000"
      # Empty = use NODE_ENV (enforce when production). Set true/false/1/0/yes/no to override.
      STANDARD_ENDPOINT_REQUIRE_HTTPS:
        kind: literal
        default: ""
      # When true, honor X-Forwarded-Proto from a TLS-terminating reverse proxy (ingress/LB).
      STANDARD_ENDPOINT_TRUST_PROXY:
        kind: literal
        default: "false"
  web-sidecar:
    inherits:
      - from: locale
        map:
          DEFAULT_LOCALE: NEXT_PUBLIC_DEFAULT_LOCALE
          SUPPORTED_LOCALES: NEXT_PUBLIC_SUPPORTED_LOCALES
      - from: auth
        map:
          AUTH_MODE: NEXT_PUBLIC_AUTH_MODE
      - from: info
        map:
          WEB_BRAND_NAME: NEXT_PUBLIC_WEB_BRAND_NAME
      - from: http
        file_splits: [api, web, web-sidecar]
        map:
          API_PORT: API_PORT
          API_VERSION_PATH: NEXT_PUBLIC_API_VERSION_PATH
          API_PUBLIC_BASE_URL: NEXT_PUBLIC_API_PUBLIC_BASE_URL
          API_SERVER_BASE_URL: API_SERVER_BASE_URL
          WEB_PORT: WEB_PORT
          WEB_BASE_URL: NEXT_PUBLIC_WEB_BASE_URL
          WEB_SIDECAR_PORT: WEB_SIDECAR_PORT
    vars:
      NEXT_PUBLIC_SESSION_REFRESH_INTERVAL_MS:
        kind: config
        default: "600000"
  web:
    no_env_from: true
    inherits:
      - from: http
        file_splits: [web]
        map:
          WEB_PORT: WEB_PORT
          WEB_BASE_URL: WEB_BASE_URL
    vars:
      RUNTIME_CONFIG_URL:
        kind: literal
        default: "http://localhost:4001"
  management-api:
    inherits:
      - from: locale
        map:
          DEFAULT_LOCALE: DEFAULT_LOCALE
          SUPPORTED_LOCALES: SUPPORTED_LOCALES
      - from: auth
        map:
          AUTH_MODE: AUTH_MODE
      - from: valkey
        file_splits: [valkey]
        map:
          VALKEY_HOST: VALKEY_HOST
          VALKEY_PORT: VALKEY_PORT
          VALKEY_PASSWORD: VALKEY_PASSWORD
      - from: db
        map:
          DB_HOST: DB_HOST
          DB_PORT: DB_PORT
          DB_USER: DB_USER
          DB_PASSWORD: DB_PASSWORD
          DB_APP_NAME: DB_APP_NAME
          DB_APP_READ_USER: DB_APP_READ_USER
          DB_APP_READ_PASSWORD: DB_APP_READ_PASSWORD
          DB_APP_READ_WRITE_USER: DB_APP_READ_WRITE_USER
          DB_APP_READ_WRITE_PASSWORD: DB_APP_READ_WRITE_PASSWORD
          DB_MANAGEMENT_NAME: DB_MANAGEMENT_NAME
          DB_MANAGEMENT_READ_USER: DB_MANAGEMENT_READ_USER
          DB_MANAGEMENT_READ_PASSWORD: DB_MANAGEMENT_READ_PASSWORD
          DB_MANAGEMENT_READ_WRITE_USER: DB_MANAGEMENT_READ_WRITE_USER
          DB_MANAGEMENT_READ_WRITE_PASSWORD: DB_MANAGEMENT_READ_WRITE_PASSWORD
      - from: http
        file_splits: [api, web, management-api, management-web]
        map:
          API_PORT: API_PORT
          API_VERSION_PATH: MANAGEMENT_API_VERSION_PATH
          API_PUBLIC_BASE_URL: API_PUBLIC_BASE_URL
          API_SERVER_BASE_URL: API_SERVER_BASE_URL
          WEB_PORT: WEB_PORT
          WEB_BASE_URL: WEB_BASE_URL
          MANAGEMENT_API_PORT: MANAGEMENT_API_PORT
          MANAGEMENT_API_PUBLIC_BASE_URL: MANAGEMENT_API_PUBLIC_BASE_URL
          MANAGEMENT_API_SERVER_BASE_URL: MANAGEMENT_API_SERVER_BASE_URL
          MANAGEMENT_WEB_PORT: MANAGEMENT_WEB_PORT
          MANAGEMENT_WEB_BASE_URL: MANAGEMENT_WEB_BASE_URL
    vars:
      MANAGEMENT_API_USER_AGENT:
        kind: literal
        default: "Metaboost Bot Local/Management-API/1"
        override_file: user_agent
      MANAGEMENT_API_JWT_SECRET:
        kind: secret
        default: ""
        local_generator: hex_32
      MANAGEMENT_API_COOKIE_DOMAIN:
        kind: literal
        default: "localhost"
      MANAGEMENT_API_CORS_ORIGINS:
        kind: literal
        default: "http://localhost:4102"
      MANAGEMENT_API_SESSION_COOKIE_NAME:
        kind: literal
        default: "management_api_session"
      MANAGEMENT_API_REFRESH_COOKIE_NAME:
        kind: literal
        default: "management_api_refresh"
      MANAGEMENT_API_JWT_ACCESS_EXPIRY_SECONDS:
        kind: literal
        default: "3600"
      MANAGEMENT_API_JWT_REFRESH_EXPIRY_SECONDS:
        kind: literal
        default: "3600"
      MANAGEMENT_API_USER_INVITATION_TTL_HOURS:
        kind: literal
        default: "24"
  management-web-sidecar:
    inherits:
      - from: locale
        map:
          DEFAULT_LOCALE: NEXT_PUBLIC_DEFAULT_LOCALE
          SUPPORTED_LOCALES: NEXT_PUBLIC_SUPPORTED_LOCALES
      - from: info
        map:
          MANAGEMENT_WEB_BRAND_NAME: NEXT_PUBLIC_MANAGEMENT_WEB_BRAND_NAME
      - from: http
        file_splits: [api, web, management-api, management-web-sidecar]
        map:
          API_PORT: API_PORT
          API_VERSION_PATH: NEXT_PUBLIC_MANAGEMENT_API_VERSION_PATH
          API_PUBLIC_BASE_URL: API_PUBLIC_BASE_URL
          API_SERVER_BASE_URL: API_SERVER_BASE_URL
          WEB_PORT: WEB_PORT
          WEB_BASE_URL: NEXT_PUBLIC_WEB_BASE_URL
          MANAGEMENT_API_PORT: MANAGEMENT_API_PORT
          MANAGEMENT_API_PUBLIC_BASE_URL: NEXT_PUBLIC_MANAGEMENT_API_PUBLIC_BASE_URL
          MANAGEMENT_API_SERVER_BASE_URL: MANAGEMENT_API_SERVER_BASE_URL
          MANAGEMENT_WEB_SIDECAR_PORT: MANAGEMENT_WEB_SIDECAR_PORT
    vars:
      NEXT_PUBLIC_MANAGEMENT_SESSION_REFRESH_INTERVAL_MS:
        kind: config
        default: "1800000"
  management-web:
    no_env_from: true
    inherits:
      - from: http
        file_splits: [management-web]
        map:
          MANAGEMENT_WEB_PORT: MANAGEMENT_WEB_PORT
          MANAGEMENT_WEB_BASE_URL: MANAGEMENT_WEB_BASE_URL
    vars:
      RUNTIME_CONFIG_URL:
        kind: literal
        default: "http://localhost:4101"
