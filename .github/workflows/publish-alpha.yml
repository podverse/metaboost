# Publish Docker images to GHCR on alpha, beta, or main.
# Alpha: X.Y.Z-staging.N + :staging; beta: X.Y.Z-beta.N + :beta; main: RTM X.Y.Z + :prod.

name: Publish (alpha, beta, main)

on:
  push:
    branches:
      - alpha
      - beta
      - main
  workflow_dispatch:
    inputs:
      version_override:
        description: "Optional version override (default: auto-increment from GHCR)"
        required: false
        type: string

permissions:
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      float_tag: ${{ steps.version.outputs.FLOAT_TAG }}
      is_prod: ${{ steps.version.outputs.is_prod }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Security audit
        run: npm audit --omit=dev

      - name: Build packages
        run: npm run build:packages

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Setup web env for build
        run: ruby scripts/env-classification/metaboost-env.rb merge-env --profile dev --group web --output apps/web/.env.local

      - name: Build apps
        run: npm run build:apps

      - name: Calculate unified version
        id: version
        env:
          GHCR_TOKEN_PRIMARY: ${{ secrets.GHCR_REGISTRY_TOKEN }}
          GHCR_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            echo "Using version override: ${{ inputs.version_override }}"
            echo "VERSION=${{ inputs.version_override }}" >> $GITHUB_OUTPUT
            R="${{ github.ref_name }}"
            if [ "$R" = "main" ]; then
              echo "FLOAT_TAG=prod" >> $GITHUB_OUTPUT
              echo "is_prod=true" >> $GITHUB_OUTPUT
            elif [ "$R" = "beta" ]; then
              echo "FLOAT_TAG=beta" >> $GITHUB_OUTPUT
              echo "is_prod=false" >> $GITHUB_OUTPUT
            else
              echo "FLOAT_TAG=staging" >> $GITHUB_OUTPUT
              echo "is_prod=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          BASE_VERSION=$(node -p "require('./package.json').version" | sed 's/-.*//')
          IMAGE_PATH="${{ github.repository }}/api"
          REF_NAME="${{ github.ref_name }}"

          if [ "$REF_NAME" = "main" ]; then
            echo "RTM (main) publish: $BASE_VERSION"
            echo "VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
            echo "FLOAT_TAG=prod" >> $GITHUB_OUTPUT
            echo "is_prod=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "is_prod=false" >> $GITHUB_OUTPUT
          if [ "$REF_NAME" = "beta" ]; then
            SUFFIX=beta
          elif [ "$REF_NAME" = "alpha" ]; then
            SUFFIX=staging
          else
            echo "Unexpected ref $REF_NAME" >&2
            exit 1
          fi
          if [ "$SUFFIX" = "beta" ]; then
            echo "FLOAT_TAG=beta" >> $GITHUB_OUTPUT
          else
            echo "FLOAT_TAG=staging" >> $GITHUB_OUTPUT
          fi
          echo "Prerelease suffix: $SUFFIX (branch $REF_NAME)"

          echo "Base version: $BASE_VERSION"
          echo "Reference image path: $IMAGE_PATH"

          query_tags() {
            local token="$1"
            local token_name="$2"

            if [ -z "$token" ]; then
              return 2
            fi

            echo "Attempting GHCR tag discovery with ${token_name}..."
            local tags_response
            tags_response=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $token" \
              "https://ghcr.io/v2/${IMAGE_PATH}/tags/list")
            TAGS_JSON=$(echo "$tags_response" | sed '$d')
            TAGS_STATUS=$(echo "$tags_response" | tail -n1)
            TAGS_TOKEN_USED="$token_name"

            if [ "$TAGS_STATUS" = "200" ]; then
              return 0
            fi
            if [ "$TAGS_STATUS" = "404" ]; then
              return 4
            fi
            if [ "$TAGS_STATUS" = "401" ] || [ "$TAGS_STATUS" = "403" ]; then
              return 3
            fi
            return 1
          }

          BOOTSTRAP_EMPTY_STATE=false
          TAGS_TOKEN_USED=""
          TAGS_JSON='{"tags":[]}'
          TAGS_STATUS=""
          QUERY_RESULT=1

          if query_tags "$GHCR_TOKEN_PRIMARY" "GHCR_REGISTRY_TOKEN"; then
            QUERY_RESULT=0
          else
            QUERY_RESULT=$?
          fi

          if [ "$QUERY_RESULT" = "2" ]; then
            echo "GHCR_REGISTRY_TOKEN not set; falling back to GITHUB_TOKEN for tag discovery."
            if query_tags "$GHCR_TOKEN_FALLBACK" "GITHUB_TOKEN"; then
              QUERY_RESULT=0
            else
              QUERY_RESULT=$?
            fi
          elif [ "$QUERY_RESULT" = "3" ]; then
            echo "GHCR_REGISTRY_TOKEN returned HTTP ${TAGS_STATUS}; retrying with GITHUB_TOKEN."
            if query_tags "$GHCR_TOKEN_FALLBACK" "GITHUB_TOKEN"; then
              QUERY_RESULT=0
            else
              QUERY_RESULT=$?
            fi
          fi

          if [ "$QUERY_RESULT" = "4" ]; then
            BOOTSTRAP_EMPTY_STATE=true
            TAGS_JSON='{"tags":[]}'
            echo "GHCR package path not found yet (HTTP 404). Treating as first publish bootstrap."
          elif [ "$QUERY_RESULT" = "3" ]; then
            echo "Failed to list GHCR tags for ${IMAGE_PATH} due to auth/permission (HTTP ${TAGS_STATUS})."
            echo "Ensure GHCR_REGISTRY_TOKEN has packages:read (or org allows GITHUB_TOKEN package reads)."
            echo "You can also run with version_override for a one-off publish."
            exit 1
          elif [ "$QUERY_RESULT" = "2" ]; then
            echo "Failed to list GHCR tags for ${IMAGE_PATH}: no usable token available."
            echo "Set GHCR_REGISTRY_TOKEN or ensure GITHUB_TOKEN can read packages."
            exit 1
          elif [ "$QUERY_RESULT" != "0" ]; then
            echo "Failed to list GHCR tags for ${IMAGE_PATH} (HTTP ${TAGS_STATUS})."
            echo "Unexpected GHCR response; re-run or use version_override for a one-off publish."
            exit 1
          fi

          if [ "$BOOTSTRAP_EMPTY_STATE" = "false" ]; then
            echo "GHCR tag discovery succeeded with ${TAGS_TOKEN_USED}."
          fi

          TAGS=$(echo "$TAGS_JSON" | jq -r '.tags[]?' 2>/dev/null | grep "^${BASE_VERSION}-${SUFFIX}\." || true)

          if [ -z "$TAGS" ]; then
            if [ "$BOOTSTRAP_EMPTY_STATE" = "true" ]; then
              echo "No existing GHCR package/tags found. Bootstrapping at ${BASE_VERSION}-${SUFFIX}.0"
            else
              echo "No ${SUFFIX} tags for ${BASE_VERSION}. Starting at ${SUFFIX}.0"
            fi
            NEXT_VERSION="${BASE_VERSION}-${SUFFIX}.0"
          else
            LATEST=$(echo "$TAGS" | sort -V | tail -n1)
            CURRENT_NUM=$(echo "$LATEST" | sed -En "s/.*[.]${SUFFIX}\.([0-9]+)\$/\1/p")
            if [ -z "$CURRENT_NUM" ]; then
              NEXT_VERSION="${BASE_VERSION}-${SUFFIX}.0"
            else
              NEXT_NUM=$((CURRENT_NUM + 1))
              NEXT_VERSION="${BASE_VERSION}-${SUFFIX}.${NEXT_NUM}"
            fi
            echo "Latest existing: $LATEST, next: $NEXT_VERSION"
          fi

          echo "VERSION=$NEXT_VERSION" >> $GITHUB_OUTPUT

  publish-docker:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: infra/docker/local/api/Dockerfile
          - app: management-api
            dockerfile: infra/docker/local/management-api/Dockerfile
          - app: web
            dockerfile: infra/docker/local/web/Dockerfile
          - app: web-sidecar
            dockerfile: infra/docker/local/web-sidecar/Dockerfile
          - app: management-web
            dockerfile: infra/docker/local/management-web/Dockerfile
          - app: management-web-sidecar
            dockerfile: infra/docker/local/management-web-sidecar/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ needs.validate.outputs.version }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ needs.validate.outputs.float_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-published-tags:
    needs: [validate, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Verify expected tags in GHCR
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          FLOAT_TAG: ${{ needs.validate.outputs.float_tag }}
          GHCR_TOKEN_PRIMARY: ${{ secrets.GHCR_REGISTRY_TOKEN }}
          GHCR_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GHCR_TOKEN="$GHCR_TOKEN_PRIMARY"
          if [ -z "$GHCR_TOKEN" ]; then
            GHCR_TOKEN="$GHCR_TOKEN_FALLBACK"
            echo "GHCR_REGISTRY_TOKEN not set; falling back to GITHUB_TOKEN for verification."
          fi

          APPS="api management-api web web-sidecar management-web management-web-sidecar"
          for APP in $APPS; do
            IMAGE_PATH="${{ github.repository }}/${APP}"
            echo "Checking tags for ${IMAGE_PATH}"

            TAGS_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              "https://ghcr.io/v2/${IMAGE_PATH}/tags/list")
            TAGS_JSON=$(echo "$TAGS_RESPONSE" | sed '$d')
            TAGS_STATUS=$(echo "$TAGS_RESPONSE" | tail -n1)

            if [ "$TAGS_STATUS" != "200" ]; then
              echo "Tag verification failed for ${IMAGE_PATH} (HTTP ${TAGS_STATUS})."
              exit 1
            fi

            if ! echo "$TAGS_JSON" | jq -e --arg VERSION "$VERSION" '.tags | index($VERSION)' >/dev/null; then
              echo "Missing version tag ${VERSION} for ${IMAGE_PATH}."
              exit 1
            fi

            if ! echo "$TAGS_JSON" | jq -e --arg T "$FLOAT_TAG" '.tags | index($T)' >/dev/null; then
              echo "Missing floating tag ${FLOAT_TAG} for ${IMAGE_PATH}."
              exit 1
            fi
          done

  # Surfaces the semver tag (e.g. 0.1.5-staging.3) on the workflow run Summary tab.
  workflow-summary:
    needs: [validate, verify-published-tags]
    runs-on: ubuntu-latest
    steps:
      - name: Published image version (workflow summary)
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
          FT: ${{ needs.validate.outputs.float_tag }}
        run: |
          {
            echo "## Published Docker images"
            echo ""
            echo "**Image version (semver tag):** \`${{ needs.validate.outputs.version }}\`"
            echo ""
            echo "Each image was also tagged **\`${{ needs.validate.outputs.float_tag }}\`** (floating)."
            echo ""
            echo "| Image | Tags |"
            echo "|-------|------|"
            for app in api management-api web web-sidecar management-web management-web-sidecar; do
              echo "| \`ghcr.io/${REPO}/${app}\` | \`${VERSION}\`, \`${FT}\` |"
            done
            echo ""
            echo "Pin GitOps to the version tag or the floating tag. Git tag matches the semver when created."
          } >> "$GITHUB_STEP_SUMMARY"

  git-tag-staging:
    needs: [validate, verify-published-tags]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create or verify Git tag (matches GHCR staging semver tag)
        uses: actions/github-script@v7
        env:
          VERSION_TAG: ${{ needs.validate.outputs.version }}
          TARGET_SHA: ${{ github.sha }}
        with:
          script: |
            const tag = process.env.VERSION_TAG;
            const targetSha = process.env.TARGET_SHA;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function resolveTagToCommitSha() {
              const { data } = await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              const obj = data.object;
              if (obj.type === 'commit') {
                return obj.sha;
              }
              if (obj.type === 'tag') {
                const { data: tagObj } = await github.rest.git.getTag({
                  owner,
                  repo,
                  tag_sha: obj.sha,
                });
                return tagObj.object.sha;
              }
              throw new Error(`Unexpected git ref object type: ${obj.type}`);
            }

            try {
              const existingSha = await resolveTagToCommitSha();
              if (existingSha === targetSha) {
                core.info(`Tag ${tag} already points at ${targetSha}; noop.`);
                return;
              }
              core.setFailed(
                `Refusing to move tag ${tag}: it points at ${existingSha}, workflow commit is ${targetSha}`,
              );
            } catch (err) {
              if (err.status !== 404) {
                throw err;
              }
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: targetSha,
              });
              core.info(`Created tag ${tag} -> ${targetSha}`);
            }

  github-prerelease-create:
    needs: [git-tag-staging, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          IS_PROD: ${{ needs.validate.outputs.is_prod }}
        with:
          script: |
            const version = "${{ needs.validate.outputs.version }}";
            const path = "docs/operations/CHANGELOG-UPCOMING.md";
            const fs = require("fs");
            const isProd = process.env.IS_PROD === "true";
            let body;
            if (fs.existsSync(path)) {
              body = fs.readFileSync(path, "utf8");
            } else {
              body = (isProd ? "Production" : "Prerelease") + " build; no " + path + " at this commit. Add the file on develop to populate future notes.";
            }
            const tag = version;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: list } = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            if (list.some((r) => r.tag_name === tag)) {
              core.info("Release for tag " + tag + " already exists; skip.");
              return;
            }
            const rel = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              body,
              prerelease: !isProd,
            });
            core.info("Created release: " + rel.data.html_url);

  changelog-pr-to-develop:
    needs: [github-prerelease-create, git-tag-staging, validate]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out develop
        uses: actions/checkout@v6
        with:
          ref: develop
      - name: Write archive and reset UPCOMING markers
        uses: actions/github-script@v7
        env:
          PUBLISH_SHA: ${{ github.sha }}
          PUBLISH_VERSION: ${{ needs.validate.outputs.version }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = process.env.PUBLISH_SHA;
            const version = process.env.PUBLISH_VERSION;
            const runId = process.env.RUN_ID;
            const refName = process.env.REF_NAME || "unknown";
            const label = refName === "main" ? "production" : refName;
            const upcomingPath = "docs/operations/CHANGELOG-UPCOMING.md";
            let upcoming = "";
            try {
              const { data } = await github.rest.repos.getContent({ owner, repo, path: upcomingPath, ref });
              if (data && data.type === "file" && "content" in data && "encoding" in data && data.encoding === "base64") {
                upcoming = Buffer.from(String(data.content).replace(/\n/g, ""), "base64").toString("utf8");
              }
            } catch (e) {
              if (e.status === 404) {
                core.info("No " + upcomingPath + " on publish commit: " + ref);
                upcoming = "";
              } else {
                throw e;
              }
            }
            const safe = version.replace(/\./g, "-");
            const dir = "docs/operations/CHANGELOG-ARCHIVE";
            fs.mkdirSync(dir, { recursive: true });
            const head =
              "# Release " + version + " (" + label + ")\n\n" +
              "From [`" + ref.substring(0, 7) + "`](https://github.com/" + owner + "/" + repo + "/commit/" + ref + "]) — " +
              "[workflow run](" + "https://github.com/" + owner + "/" + repo + "/actions/runs/" + runId + ").\n\n";
            fs.writeFileSync(dir + "/RELEASE-" + safe + ".md", head + (upcoming || "_(no CHANGELOG-UPCOMING.md at that commit.)_\n"));
            if (fs.existsSync(upcomingPath)) {
              let s = fs.readFileSync(upcomingPath, "utf8");
              if (s.includes("UPCOMING-AUTO-START") && s.includes("UPCOMING-AUTO-END")) {
                s = s.replace(
                  /<!--\s*UPCOMING-AUTO-START\s*-->[\s\S]*?<!--\s*UPCOMING-AUTO-END\s*-->/m,
                  "<!-- UPCOMING-AUTO-START -->\n" +
                    "<!-- Add concise bullets (most important first) for the next significant changes. -->\n" +
                    "<!-- UPCOMING-AUTO-END -->\n"
                );
                fs.writeFileSync(upcomingPath, s, "utf8");
              }
            }
      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: archive changelog for ${{ github.ref_name }} ${{ needs.validate.outputs.version }}"
          title: "chore: archive changelog for ${{ needs.validate.outputs.version }} (${{ github.ref_name }})"
          body: |
            Automated follow-up to a successful [publish](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) on \`${{ github.ref_name }}\`.

            - Archives a copy of [CHANGELOG-UPCOMING](docs/operations/CHANGELOG-UPCOMING.md) as it was on the **publish** commit, under [CHANGELOG-ARCHIVE](docs/operations/CHANGELOG-ARCHIVE/).
            - Resets the `UPCOMING-AUTO-START` / `UPCOMING-AUTO-END` block on **develop** (when that file exists) so you can add entries for the next window.
          base: develop
          branch: automation/changelog-${{ github.ref_name }}-${{ needs.validate.outputs.version }}-${{ github.run_id }}
          delete-branch: true
          signoff: false
